<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时空转盘仪表板 - 四圈创意 Web 钟表</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* 钟表外包裹 */
        .clock-container {
            position: relative;
            width: 680px;
            height: 680px;
            margin-bottom: 30px;
        }

        /* 所有圆盘核心居中 */
        .absolute-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
        }

        /* --- 四圈基础轨道尺寸与层级 --- */
        #second-track {
            width: 640px;
            height: 640px;
            border: 1px solid rgba(255, 71, 87, 0.2);
            z-index: 1;
        }

        #minute-track {
            width: 510px;
            height: 510px;
            border: 1px solid rgba(255, 165, 2, 0.2);
            z-index: 2;
        }

        #hour-track {
            width: 380px;
            height: 380px;
            border: 1px solid rgba(46, 213, 115, 0.2);
            z-index: 3;
        }

        #week-track {
            width: 250px;
            height: 250px;
            border: 1px solid rgba(30, 144, 255, 0.25);
            z-index: 4;
        }

        /* --- 彩色模式下的实体圆盘背景色 --- */
        .color-mode #second-track {
            background-color: rgba(255, 71, 87, 0.04);
        }

        .color-mode #minute-track {
            background-color: rgba(255, 165, 2, 0.05);
        }

        .color-mode #hour-track {
            background-color: rgba(46, 213, 115, 0.06);
        }

        .color-mode #week-track {
            background-color: rgba(30, 144, 255, 0.08);
        }

        /* 刻度包装盒 */
        .scale-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            pointer-events: none;
        }

        /* 单个刻度条容器 */
        .tick-item {
            position: absolute;
            top: 0;
            left: 50%;
            width: 40px;
            height: 50%;
            margin-left: -20px;
            transform-origin: bottom center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tick-mark {
            width: 1px;
            background-color: #555;
        }

        .tick-num {
            font-size: 10px;
            color: #777;
            text-align: center;
            line-height: 1;
            margin-top: 3px;
            transition: color 0.4s ease;
        }

        /* --- 各圈刻度与高亮样式 --- */
        #second-track .tick-mark {
            height: 6px;
        }

        #second-track .tick-item.major .tick-mark {
            height: 11px;
            width: 1.5px;
            background-color: #ff4757;
        }

        #second-track .tick-item.major .tick-num {
            color: #ff4757;
            font-weight: bold;
        }

        #minute-track .tick-mark {
            height: 5px;
        }

        #minute-track .tick-item.major .tick-mark {
            height: 10px;
            width: 1.5px;
            background-color: #ffa502;
        }

        #minute-track .tick-item.major .tick-num {
            color: #ffa502;
        }

        #hour-track .tick-mark {
            height: 6px;
            width: 1.5px;
            background-color: #2ed573;
        }

        #hour-track .tick-num {
            color: #2ed573;
            font-size: 11px;
            margin-top: 4px;
        }

        #week-track .tick-mark {
            height: 7px;
            width: 1.5px;
            background-color: #1e90ff;
        }

        #week-track .tick-num {
            color: #1e90ff;
            font-size: 11px;
            font-weight: bold;
            margin-top: 4px;
        }

        .color-mode .tick-num {
            color: #aaaaaa;
        }

        /* --- 传统指针样式：极细线 --- */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 2px 2px 0 0;
            z-index: 10;
        }

        #second-hand {
            width: 1px;
            height: 295px;
            background: #ff4757;
            margin-left: -0.5px;
        }

        #minute-hand {
            width: 2px;
            height: 220px;
            background: #ffa502;
            margin-left: -1px;
        }

        #hour-hand {
            width: 2.5px;
            height: 155px;
            background: #2ed573;
            margin-left: -1.25px;
        }

        #week-hand {
            width: 2.5px;
            height: 95px;
            background: #1e90ff;
            margin-left: -1.25px;
        }

        .center-nut {
            width: 12px;
            height: 12px;
            background-color: #ffffff;
            z-index: 25;
            box-shadow: 0 0 6px rgba(0, 0, 0, 0.8);
        }

        /* --- 右侧单条静止基准线：1px 纯红细针 --- */
        .fixed-reading-line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 320px;
            height: 1px;
            background-color: #ff4757;
            transform-origin: left center;
            transform: translateY(-50%) rotate(0deg);
            z-index: 20;
            display: none;
            pointer-events: none;
            box-shadow: 0 0 4px rgba(255, 71, 87, 0.5);
        }

        /* 隐藏传统指针的动态控制类 */
        .hide-hand {
            display: none !important;
        }

        /* 底部控制按钮区域 */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            z-index: 100;
        }

        .control-btn {
            padding: 10px 18px;
            background-color: #222;
            color: #ccc;
            border: 1px solid #444;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .control-btn:hover {
            background-color: #333;
            color: #fff;
            border-color: #666;
        }

        .control-btn.active-status {
            background-color: #3f3f3f;
            color: #fff;
            border-color: #888;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>

    <div class="clock-container" id="clock-board">
        <div id="second-track" class="absolute-center">
            <div class="scale-wrapper" id="second-scales"></div>
        </div>
        <div id="minute-track" class="absolute-center">
            <div class="scale-wrapper" id="minute-scales"></div>
        </div>
        <div id="hour-track" class="absolute-center">
            <div class="scale-wrapper" id="hour-scales"></div>
        </div>
        <div id="week-track" class="absolute-center">
            <div class="scale-wrapper" id="week-scales"></div>
        </div>

        <div id="second-hand" class="hand"></div>
        <div id="minute-hand" class="hand"></div>
        <div id="hour-hand" class="hand"></div>
        <div id="week-hand" class="hand"></div>

        <div id="reading-line" class="fixed-reading-line"></div>

        <div class="center-nut absolute-center"></div>
    </div>

    <div class="btn-group">
        <button class="control-btn" id="toggle-dir-btn">文字方向：放射模式</button>
        <button class="control-btn" id="toggle-color-btn">表盘背景：默认暗黑</button>
        <button class="control-btn" id="toggle-motion-btn">走时方式：平滑流动</button>
        <button class="control-btn" id="toggle-mode-btn">显示模式：指针旋转</button>
        <button class="control-btn" id="toggle-density-btn">数字密度：每5格显示</button>
    </div>

    <script>
        // 配置状态
        let config = {
            textDirectionMode: 'radial',
            isColorMode: false,
            motionMode: 'smooth',
            displayMode: 'hand-rot',
            densityMode: 'sparse' // 'sparse' 为每5格显示数字，'full' 为全部刻度均显示数字
        };

        // 按圈分类存储文字元素，方便动画帧中精准快速地分圈做矩阵反向补偿
        let categorizedTickNums = { sec: [], min: [], hr: [], wk: [] };

        const trackElements = {
            sec: document.getElementById('second-track'),
            min: document.getElementById('minute-track'),
            hr: document.getElementById('hour-track'),
            wk: document.getElementById('week-track')
        };
        const handElements = {
            sec: document.getElementById('second-hand'),
            min: document.getElementById('minute-hand'),
            hr: document.getElementById('hour-hand'),
            wk: document.getElementById('week-hand')
        };
        const readingLine = document.getElementById('reading-line');

        // 用于记录时间转换的平滑连续变量
        let lastSeconds = 0, secondAngleTarget = 0;
        let lastMinutes = 0, minuteAngleTarget = 0;
        let lastHours = 0, hourAngleTarget = 0;
        let lastDays = -1, weekAngleTarget = 0;

        // 渲染刻度逻辑
        function renderRingScales(wrapperId, ringKey, totalTicks, labelFunc, isMajorFunc) {
            const wrapper = document.getElementById(wrapperId);
            wrapper.innerHTML = ''; // 清空原有内容，方便切换模式时重新生成
            for (let i = 0; i < totalTicks; i++) {
                const item = document.createElement('div');
                item.className = 'tick-item';
                const angle = (i * 360) / totalTicks;
                item.style.transform = `rotate(${angle}deg)`;

                if (isMajorFunc && isMajorFunc(i)) item.classList.add('major');

                const mark = document.createElement('div');
                mark.className = 'tick-mark';
                item.appendChild(mark);

                const labelText = labelFunc ? labelFunc(i) : '';
                if (labelText !== null && labelText !== '') {
                    const num = document.createElement('div');
                    num.className = 'tick-num';
                    num.innerText = labelText;
                    num.dataset.originalAngle = angle;
                    item.appendChild(num);
                    categorizedTickNums[ringKey].push(num); // 分组归档
                }
                wrapper.appendChild(item);
            }
        }

        // 初始化/刷新表盘文字布局
        function initAllRingScales() {
            categorizedTickNums = { sec: [], min: [], hr: [], wk: [] };

            // 秒圈和分圈根据 densityMode 配置决定是全显还是每5格显示
            if (config.densityMode === 'full') {
                renderRingScales('second-scales', 'sec', 60, (i) => (i < 10 ? '0' + i : i), (i) => i % 5 === 0);
                renderRingScales('minute-scales', 'min', 60, (i) => (i < 10 ? '0' + i : i), (i) => i % 5 === 0);
            } else {
                renderRingScales('second-scales', 'sec', 60, (i) => (i % 5 === 0 ? (i < 10 ? '0' + i : i) : ''), (i) => i % 5 === 0);
                renderRingScales('minute-scales', 'min', 60, (i) => (i % 5 === 0 ? (i < 10 ? '0' + i : i) : ''), (i) => i % 5 === 0);
            }

            // 时圈与周圈属于固定展示逻辑，不受密度按钮干扰
            renderRingScales('hour-scales', 'hr', 24, (i) => (i < 10 ? '0' + i : i), () => true);
            const weeks = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            renderRingScales('week-scales', 'wk', 7, (i) => weeks[i], () => true);
        }

        function loadSavedConfig() {
            const savedConfig = localStorage.getItem('four_ring_clock_config');
            if (savedConfig) { try { config = JSON.parse(savedConfig); } catch (e) { } }
            // 预初始化角度变量
            const initDate = new Date();
            lastSeconds = initDate.getSeconds();
            lastMinutes = initDate.getMinutes();
            lastHours = initDate.getHours();
            lastDays = initDate.getDay();
            secondAngleTarget = lastSeconds * 6;
            minuteAngleTarget = lastMinutes * 6;
            hourAngleTarget = lastHours * 15;
            weekAngleTarget = lastDays * (360 / 7);

            initAllRingScales();
            applyConfigUI();
        }
        function saveConfig() { localStorage.setItem('four_ring_clock_config', JSON.stringify(config)); }

        // 应用配置
        function applyConfigUI() {
            const toggleDirBtn = document.getElementById('toggle-dir-btn');
            const toggleColorBtn = document.getElementById('toggle-color-btn');
            const toggleMotionBtn = document.getElementById('toggle-motion-btn');
            const toggleModeBtn = document.getElementById('toggle-mode-btn');
            const toggleDensityBtn = document.getElementById('toggle-density-btn');
            const clockBoard = document.getElementById('clock-board');

            // 1. 文字方向按钮文本切换
            if (config.textDirectionMode === 'upright') {
                toggleDirBtn.innerText = '文字方向：正立模式';
                toggleDirBtn.classList.add('active-status');
            } else {
                toggleDirBtn.innerText = '文字方向：放射模式';
                toggleDirBtn.classList.remove('active-status');
                // 放射模式下，直接重置清空所有的多余补偿
                Object.values(categorizedTickNums).flat().forEach(num => num.style.transform = 'rotate(0deg)');
            }

            // 2. 表盘背景
            if (config.isColorMode) {
                clockBoard.classList.add('color-mode');
                toggleColorBtn.innerText = '表盘背景：各圈独立';
                toggleColorBtn.classList.add('active-status');
            } else {
                clockBoard.classList.remove('color-mode');
                toggleColorBtn.innerText = '表盘背景：默认暗黑';
                toggleColorBtn.classList.remove('active-status');
            }

            // 3. 走时方式
            if (config.motionMode === 'smooth') toggleMotionBtn.innerText = '走时方式：平滑流动';
            else if (config.motionMode === 'sec-tick') toggleMotionBtn.innerText = '走时方式：仅秒针跳';
            else toggleMotionBtn.innerText = '走时方式：全指针跳';

            if (config.motionMode !== 'smooth') toggleMotionBtn.classList.add('active-status');
            else toggleMotionBtn.classList.remove('active-status');

            // 4. 显示模式
            if (config.displayMode === 'dial-rot') {
                toggleModeBtn.innerText = '显示模式：表盘旋转';
                toggleModeBtn.classList.add('active-status');
                Object.values(handElements).forEach(el => el.classList.add('hide-hand'));
                readingLine.style.display = 'block';
            } else {
                toggleModeBtn.innerText = '显示模式：指针旋转';
                toggleModeBtn.classList.remove('active-status');
                Object.values(handElements).forEach(el => el.classList.remove('hide-hand'));
                readingLine.style.display = 'none';
                Object.values(trackElements).forEach(el => el.style.transform = 'translate(-50%, -50%) rotate(0deg)');
            }

            // 5. 数字密度
            if (config.densityMode === 'full') {
                toggleDensityBtn.innerText = '数字密度：全部显示';
                toggleDensityBtn.classList.add('active-status');
            } else {
                toggleDensityBtn.innerText = '数字密度：每5格显示';
                toggleDensityBtn.classList.remove('active-status');
            }

            // 阻尼过渡
            const needTransition = config.motionMode === 'smooth' || (config.motionMode === 'sec-tick');
            const transStyle = needTransition ? 'transform 0.1s cubic-bezier(0.25, 1, 0.5, 1)' : 'none';

            Object.values(handElements).forEach(el => el.style.transition = transStyle);
            Object.values(trackElements).forEach(el => el.style.transition = transStyle);
            if (config.motionMode === 'sec-tick') {
                handElements.sec.style.transition = 'none';
                trackElements.sec.style.transition = 'none';
            }
        }

        // 事件监听
        document.getElementById('toggle-dir-btn').addEventListener('click', () => {
            config.textDirectionMode = (config.textDirectionMode === 'radial') ? 'upright' : 'radial';
            applyConfigUI(); saveConfig();
        });
        document.getElementById('toggle-color-btn').addEventListener('click', () => {
            config.isColorMode = !config.isColorMode;
            applyConfigUI(); saveConfig();
        });
        document.getElementById('toggle-motion-btn').addEventListener('click', () => {
            if (config.motionMode === 'smooth') config.motionMode = 'sec-tick';
            else if (config.motionMode === 'sec-tick') config.motionMode = 'all-tick';
            else config.motionMode = 'smooth';
            applyConfigUI(); saveConfig();
        });
        document.getElementById('toggle-mode-btn').addEventListener('click', () => {
            config.displayMode = (config.displayMode === 'hand-rot') ? 'dial-rot' : 'hand-rot';
            applyConfigUI(); saveConfig();
        });
        document.getElementById('toggle-density-btn').addEventListener('click', () => {
            config.densityMode = (config.densityMode === 'sparse') ? 'full' : 'sparse';
            initAllRingScales(); // 密度改变，重塑 DOM
            applyConfigUI(); saveConfig();
        });

        // 核心动力源
        function runClock() {
            const now = new Date();
            const msh = now.getMilliseconds();
            const sec = now.getSeconds();
            const min = now.getMinutes();
            const hr = now.getHours();
            const day = now.getDay();

            // 1. 秒角度
            if (sec !== lastSeconds) {
                if (sec === 0 && lastSeconds === 59) secondAngleTarget += 6;
                else secondAngleTarget += (sec - lastSeconds) * 6;
                lastSeconds = sec;
            }
            let sAng = secondAngleTarget;
            if (config.motionMode === 'smooth') {
                sAng += (msh * 0.006);
            }

            // 2. 分角度
            if (min !== lastMinutes) {
                if (min === 0 && lastMinutes === 59) minuteAngleTarget += 6;
                else minuteAngleTarget += (min - lastMinutes) * 6;
                lastMinutes = min;
            }
            let mAng = minuteAngleTarget;
            if (config.motionMode === 'smooth' || config.motionMode === 'sec-tick') {
                mAng += (sec * 0.1);
            }

            // 3. 时角度
            if (hr !== lastHours) {
                if (hr === 0 && lastHours === 23) hourAngleTarget += 15;
                else hourAngleTarget += (hr - lastHours) * 15;
                lastHours = hr;
            }
            let hAng = hourAngleTarget;
            if (config.motionMode === 'smooth' || config.motionMode === 'sec-tick') {
                hAng += (min * 0.25);
            }

            // 4. 周角度
            const degreesPerDay = 360 / 7;
            if (day !== lastDays) {
                if (lastDays !== -1) {
                    if (day === 0 && lastDays === 6) weekAngleTarget += degreesPerDay;
                    else {
                        let diff = day - lastDays;
                        if (diff < -1) diff += 7;
                        weekAngleTarget += diff * degreesPerDay;
                    }
                } else {
                    weekAngleTarget = day * degreesPerDay;
                }
                lastDays = day;
            }
            let wAng = weekAngleTarget;
            if (config.motionMode === 'smooth' || config.motionMode === 'sec-tick') {
                wAng += (hr * (degreesPerDay / 24));
            }

            // 计算各表盘轨道的动态旋转角度变量
            let secTrackRot = 0, minTrackRot = 0, hrTrackRot = 0, wkTrackRot = 0;

            // --- UI 渲染输出 ---
            if (config.displayMode === 'hand-rot') {
                // 【标准指针模式】：表盘不转（旋转度为0）
                handElements.sec.style.transform = `translate(-50%, 0) rotate(${sAng}deg)`;
                handElements.min.style.transform = `translate(-50%, 0) rotate(${mAng}deg)`;
                handElements.hr.style.transform = `translate(-50%, 0) rotate(${hAng}deg)`;
                handElements.wk.style.transform = `translate(-50%, 0) rotate(${wAng}deg)`;
            } else {
                // 【表盘旋转模式】：计算出每一圈表盘当前的实际旋转角度
                secTrackRot = 90 - sAng;
                minTrackRot = 90 - mAng;
                hrTrackRot = 90 - hAng;
                wkTrackRot = 90 - wAng;

                trackElements.sec.style.transform = `translate(-50%, -50%) rotate(${secTrackRot}deg)`;
                trackElements.min.style.transform = `translate(-50%, -50%) rotate(${minTrackRot}deg)`;
                trackElements.hr.style.transform = `translate(-50%, -50%) rotate(${hrTrackRot}deg)`;
                trackElements.wk.style.transform = `translate(-50%, -50%) rotate(${wkTrackRot}deg)`;
            }

            // --- 文字方向：正立模式下的动态矩阵反向实时补偿 ---
            if (config.textDirectionMode === 'upright') {
                // 秒圈数字：反向纠正值 = -(刻度本身角度 + 所在轨道的动态旋转角)
                categorizedTickNums.sec.forEach(num => {
                    num.style.transform = `rotate(${- (parseFloat(num.dataset.originalAngle) + secTrackRot)}deg)`;
                });
                // 分圈数字
                categorizedTickNums.min.forEach(num => {
                    num.style.transform = `rotate(${- (parseFloat(num.dataset.originalAngle) + minTrackRot)}deg)`;
                });
                // 时圈数字
                categorizedTickNums.hr.forEach(num => {
                    num.style.transform = `rotate(${- (parseFloat(num.dataset.originalAngle) + hrTrackRot)}deg)`;
                });
                // 周圈数字
                categorizedTickNums.wk.forEach(num => {
                    num.style.transform = `rotate(${- (parseFloat(num.dataset.originalAngle) + wkTrackRot)}deg)`;
                });
            }

            requestAnimationFrame(runClock);
        }

        loadSavedConfig();
        requestAnimationFrame(runClock);
    </script>
</body>

</html>
